<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Your Documents</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --border: #e2e5ea;
      --text: #1a1d23;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --user-bg: #2563eb;
      --user-text: #ffffff;
      --ai-bg: #f1f5f9;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    #chunk-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    #chunk-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    /* ── Upload zone ── */
    #upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      flex-shrink: 0;
    }

    #upload-zone:hover,
    #upload-zone.drag-over {
      border-color: var(--accent);
      background: #eff6ff;
    }

    #upload-zone p {
      font-size: 0.9rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    #upload-zone .icon {
      font-size: 1.5rem;
      margin-bottom: 0.35rem;
    }

    #upload-status {
      font-size: 0.82rem;
      min-height: 1.2em;
      color: var(--text-muted);
    }

    #upload-status.success { color: #16a34a; }
    #upload-status.error   { color: #dc2626; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 0;
      gap: 1rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Ask Your Documents</h1>
    <div id="chunk-badge">
      <span class="dot"></span>
      <span id="chunk-count">— chunks</span>
    </div>
  </header>

  <main>
    <div id="upload-section">
      <input type="file" id="file-input" accept=".pdf" hidden />
      <div id="upload-zone">
        <div class="icon">📄</div>
        <p>Drop a PDF here or <strong>click to browse</strong></p>
      </div>
      <div id="upload-status"></div>
    </div>

    <!-- chat area and input bar added in subsequent steps -->
  </main>

<script>
  const API = 'http://localhost:8000';

  // ── Upload logic ──
  const uploadZone = document.getElementById('upload-zone');
  const fileInput  = document.getElementById('file-input');
  const uploadStatus = document.getElementById('upload-status');

  uploadZone.addEventListener('click', () => fileInput.click());

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });

  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));

  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) uploadFile(fileInput.files[0]);
  });

  async function uploadFile(file) {
    if (!file.name.endsWith('.pdf')) {
      setUploadStatus('Only PDF files are supported.', 'error');
      return;
    }
    setUploadStatus('Uploading…', '');
    const form = new FormData();
    form.append('file', file);
    try {
      const res = await fetch(`${API}/ingest`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');
      setUploadStatus(`✓ ${data.filename} — ${data.chunks_stored} chunks stored`, 'success');
      refreshChunkCount();
    } catch (err) {
      setUploadStatus(`✗ ${err.message}`, 'error');
    } finally {
      fileInput.value = '';
    }
  }

  function setUploadStatus(msg, type) {
    uploadStatus.textContent = msg;
    uploadStatus.className = type;
  }

  async function refreshChunkCount() {
    try {
      const res = await fetch(`${API}/health`);
      const data = await res.json();
      document.getElementById('chunk-count').textContent = `${data.total_chunks} chunks`;
    } catch {
      document.getElementById('chunk-count').textContent = 'unavailable';
    }
  }
</script>
</body>
</html>
