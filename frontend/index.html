<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Your Documents</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --border: #e2e5ea;
      --text: #1a1d23;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --user-bg: #2563eb;
      --user-text: #ffffff;
      --ai-bg: #f1f5f9;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #dc2626;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #ffffff;
    }

    #chunk-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.85);
    }

    #chunk-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }

    /* ── Document list ── */
    #doc-list-section {
      font-size: 0.82rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      min-height: 1.4em;
    }

    #doc-list-section .doc-tag {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.2rem 0.4rem 0.2rem 0.55rem;
      color: var(--text);
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    #doc-list-section .doc-tag .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
    }

    #doc-list-section .doc-tag .remove-btn:hover { color: #dc2626; }

    #doc-list-section .empty-hint {
      font-style: italic;
    }

    /* ── Upload zone ── */
    #upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      flex-shrink: 0;
    }

    #upload-zone:hover,
    #upload-zone.drag-over {
      border-color: var(--accent);
      background: #eff6ff;
    }

    #upload-zone p {
      font-size: 0.9rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    #upload-zone .icon {
      font-size: 1.5rem;
      margin-bottom: 0.35rem;
    }

    #upload-status {
      font-size: 0.82rem;
      min-height: 1.2em;
      color: var(--text-muted);
    }

    #upload-status.success { color: #16a34a; }
    #upload-status.error   { color: #dc2626; }

    /* ── Chat area ── */
    #chat {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding-bottom: 1rem;
    }

    .bubble {
      max-width: 82%;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .bubble.ai {
      background: var(--ai-bg);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      background: var(--user-bg);
      color: var(--user-text);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble .sender {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 0.35rem;
      opacity: 0.6;
    }

    .bubble .sources {
      margin-top: 0.6rem;
      padding-top: 0.55rem;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .bubble .sources span {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.15rem 0.45rem;
      margin: 0.2rem 0.2rem 0 0;
    }

    /* ── Input bar ── */
    #input-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 0;
      display: flex;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    #question-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }

    #question-input:focus { border-color: var(--accent); }

    #ask-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.6rem 1.1rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }

    #ask-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #ask-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Typing indicator ── */
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      margin: 0 2px;
      animation: fade 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes fade {
      0%, 80%, 100% { opacity: 0.25; }
      40%           { opacity: 1; }
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 0;
      gap: 1rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Ask Your Documents</h1>
    <div id="chunk-badge">
      <span class="dot"></span>
      <span id="chunk-count">— documents</span>
    </div>
  </header>

  <main>
    <div id="upload-section">
      <input type="file" id="file-input" accept=".pdf" hidden />
      <div id="upload-zone">
        <div class="icon">📄</div>
        <p>Drop a PDF here or <strong>click to browse</strong></p>
      </div>
      <div id="upload-status"></div>
    </div>
    <div id="doc-list-section">
      <span class="empty-hint">No documents uploaded yet.</span>
    </div>

    <div id="input-bar">
      <input id="question-input" type="text" placeholder="Ask a question about your documents…" autocomplete="off" />
      <button id="ask-btn" type="button">Ask →</button>
    </div>

    <div id="chat"></div>
  </main>

<script>
  const API = 'http://localhost:8000';

  // ── Upload logic ──
  const uploadZone = document.getElementById('upload-zone');
  const fileInput  = document.getElementById('file-input');
  const uploadStatus = document.getElementById('upload-status');

  uploadZone.addEventListener('click', () => fileInput.click());

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });

  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));

  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) uploadFile(fileInput.files[0]);
  });

  async function uploadFile(file) {
    if (!file.name.endsWith('.pdf')) {
      setUploadStatus('Only PDF files are supported.', 'error');
      return;
    }
    setUploadStatus('Uploading…', '');
    const form = new FormData();
    form.append('file', file);
    try {
      const res = await fetch(`${API}/ingest`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');
      setUploadStatus(`✓ ${data.filename} — ${data.chunks_stored} chunks stored`, 'success');
      refreshDocuments();
    } catch (err) {
      setUploadStatus(`✗ ${err.message}`, 'error');
    } finally {
      fileInput.value = '';
    }
  }

  function setUploadStatus(msg, type) {
    uploadStatus.textContent = msg;
    uploadStatus.className = type;
  }

  // ── Chat logic ──
  const chat = document.getElementById('chat');
  const questionInput = document.getElementById('question-input');
  const askBtn = document.getElementById('ask-btn');

  askBtn.addEventListener('click', submitQuestion);

  function setLoading(on) {
    questionInput.disabled = on;
    askBtn.disabled = on;
    askBtn.textContent = on ? '…' : 'Ask →';
  }

  function appendBubble(role, html) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function submitQuestion() {
    const question = questionInput.value.trim();
    if (!question) return;

    questionInput.value = '';
    appendBubble('user', `<div class="sender">You</div>${escHtml(question)}`);

    setLoading(true);
    const typingBubble = appendBubble('ai',
      `<div class="sender">AI</div><div class="typing-dots"><span></span><span></span><span></span></div>`
    );

    try {
      const res = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Request failed');

      typingBubble.remove();
      let html = `<div class="sender">AI</div>${escHtml(data.answer)}`;
      if (data.context_found && data.sources.length) {
        const tags = data.sources
          .map(s => `<span>${escHtml(s.source)} p.${s.page} (${s.score})</span>`)
          .join('');
        html += `<div class="sources"><strong>Sources:</strong><br>${tags}</div>`;
      }
      appendBubble('ai', html);
    } catch (err) {
      typingBubble.remove();
      appendBubble('ai', `<div class="sender">AI</div><em style="color:#dc2626">${escHtml(err.message)}</em>`);
    } finally {
      setLoading(false);
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  async function deleteDoc(filename) {
    try {
      const res = await fetch(`${API}/documents/${encodeURIComponent(filename)}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Delete failed');
      refreshDocuments();
    } catch (err) {
      alert(`Could not remove ${filename}: ${err.message}`);
    }
  }

  async function refreshDocuments() {
    try {
      const res = await fetch(`${API}/documents`);
      const data = await res.json();
      const docs = data.documents || [];

      // Update header badge
      document.getElementById('chunk-count').textContent =
        docs.length === 1 ? '1 document' : `${docs.length} documents`;

      // Update document list
      const section = document.getElementById('doc-list-section');
      if (docs.length === 0) {
        section.innerHTML = '<span class="empty-hint">No documents uploaded yet.</span>';
      } else {
        section.innerHTML = docs.map(d =>
          `<span class="doc-tag">📄 ${escHtml(d)}<button class="remove-btn" type="button" title="Remove" onclick="deleteDoc('${escHtml(d)}')">✕</button></span>`
        ).join('');
      }
    } catch {
      document.getElementById('chunk-count').textContent = 'unavailable';
    }
  }

  // Enter key submits question
  questionInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitQuestion();
    }
  });

  // Greet on load and fetch document list
  appendBubble('ai', '<div class="sender">AI</div>Hello! Upload a PDF and ask me anything about it.');
  refreshDocuments();
</script>
</body>
</html>
